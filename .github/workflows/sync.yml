name: VIP-Lane Sync (Max Efficiency)

on:
  schedule:
    # ORARI IN UTC (L'Italia è UTC+1 o UTC+2)
    
    # 1) NOTTE: Un solo controllo alle 02:07 di notte ITA (00:07 UTC)
    - cron: '7 0 * * *'

    # 2) MATTINA: Ogni 90 minuti (08:05, 09:35, 11:05, 12:35, 14:05, 15:35 ITA)
    # Minuti sfalsati (5 e 35) per saltare la coda dei server GitHub
    - cron: '5,35 6,9,12 * * *'
    
    # 3) PRIME TIME: Ogni 30 minuti esatti ma sfalsati (16:05, 16:35... fino alle 23:35 ITA)
    # Copre perfettamente l'orario in cui la gente compra dopo lavoro
    - cron: '5,35 14-21 * * *'

  workflow_dispatch:

concurrency:
  group: sync-turum
  cancel-in-progress: false 

jobs:
  sync-inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 3 # Abbassato a 3 min. Se ci mette di più, c'è un problema di rete.

    steps:
      - name: 1. Checkout codice
        uses: actions/checkout@v4

      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 3. Installazione Dipendenze
        run: pip install requests

      - name: 4. Esecuzione Script
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          TURUM_USER: ${{ secrets.TURUM_USER }}
          TURUM_PASS: ${{ secrets.TURUM_PASS }}
        run: python script.py
