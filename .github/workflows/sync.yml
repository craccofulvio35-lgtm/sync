name: Sniper-Sync Turum-Shopify (Max Efficienza)

on:
  schedule:
    # ORARI IN UTC (L'Italia è UTC+1/UTC+2)

    # 1) NOTTE: Un solo controllo alle 02:00 di notte ITA (00:00 UTC)
    - cron: '0 0 * * *'

    # 2) MATTINO / PRIMO POMERIGGIO: Ogni ora (08:00 - 16:00 ITA) -> 9 Esecuzioni
    - cron: '0 6-14 * * *'
    
    # 3) PRIME TIME ESTREMO: Ogni 20 minuti (17:00 - 23:00 ITA) -> 21 Esecuzioni
    - cron: '5,25,45 15-21 * * *'

  workflow_dispatch:

concurrency:
  group: sync-turum
  cancel-in-progress: false 

jobs:
  sync-inventory:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: 1. Checkout codice
        uses: actions/checkout@v4

      - name: 2. Setup Python Ultra-Veloce
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 3. Installazione Dipendenze
        run: pip install requests

      - name: 4. Esecuzione Script
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          TURUM_USER: ${{ secrets.TURUM_USER }}
          TURUM_PASS: ${{ secrets.TURUM_PASS }}
        run: python script.py # Il nome del tuo script
    
      # AGGIUNGI QUESTO BLOCCO ALLA FINE:
      - name: 5. Salva i Log (Artefatti)
        uses: actions/upload-artifact@v4
        if: always() # Salva i log anche se lo script va in errore
        with:
          name: Sync-Logs
          path: |
            *.txt
            *.csv
          retention-days: 7
