name: Hyper-Sync Turum-Shopify (1.890 Min/Mese)

on:
  schedule:
    # FASCIA 1: Mattina (06:00 - 11:59 UTC / 07:00 - 12:59 ITA) -> Ogni 30 minuti
    - cron: '0,30 6-11 * * *'
    
    # FASCIA 2: Pomeriggio (12:00 - 16:59 UTC / 13:00 - 17:59 ITA) -> Ogni 20 minuti (minuti 00, 20, 40)
    - cron: '0,20,40 12-16 * * *'
    
    # FASCIA 3: PRIME TIME SERALE (17:00 - 22:59 UTC / 18:00 - 23:59 ITA) -> Ogni 10 minuti (minuti 00, 10, 20, 30, 40, 50)
    - cron: '*/10 17-22 * * *'
    
    # NOTTE: 23:00 - 05:59 UTC (00:00 - 06:59 ITA) -> NESSUNA ESECUZIONE (Risparmio Minuti)

  workflow_dispatch:
    # Pulsante per avvio manuale d'emergenza

# Sistema Anti-Collisione Fondamentale per l'High-Frequency
concurrency:
  group: sync-turum
  # Se un'esecuzione delle 19:00 è ancora in corso alle 19:10, quella delle 19:10 
  # aspetterà in coda invece di sovrapporsi e corrompere l'inventario.
  cancel-in-progress: false 

jobs:
  sync-inventory:
    runs-on: ubuntu-latest
    
    # Kill-Switch: Se Turum va offline, fermiamo lo script dopo 4 minuti per non sprecare il budget mensile
    timeout-minutes: 4

    steps:
      - name: 1. Checkout codice
        uses: actions/checkout@v4

      - name: 2. Setup Python Ultra-Veloce
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Memorizza le librerie per avvii istantanei

      - name: 3. Installazione Dipendenze
        run: pip install requests

      - name: 4. Esecuzione Rudy 7 (God Mode)
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          TURUM_USER: ${{ secrets.TURUM_USER }}
          TURUM_PASS: ${{ secrets.TURUM_PASS }}
        run: python script.py 
